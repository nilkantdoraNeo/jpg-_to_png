<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Placeholders</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f8fafc;
      color: #334155;
    }

    .ad-slot {
      margin: 20px auto;
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
    }

    .ad-728x90 {
      width: min(100%, 728px);
      height: 90px;
    }

    .ad-300x600 {
      width: min(100%, 300px);
      height: 600px;
    }
  </style>
</head>
<body>
  <!-- AdSense 728x90 -->
  <!-- Free version: ad placeholder disabled
  <div class="ad-slot ad-728x90">Ad Placeholder 728 x 90</div>
  -->

  <!-- AdSense 300x600 -->
  <!-- Free version: ad placeholder disabled
  <div class="ad-slot ad-300x600">Ad Placeholder 300 x 600</div>
  -->

  <!-- AdSense Footer 728x90 -->
  <!-- Free version: ad placeholder disabled
  <div class="ad-slot ad-728x90">Ad Placeholder Footer 728 x 90</div>
  -->
</body>
</html>
